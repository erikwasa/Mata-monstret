<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mata monstret</title>

  <meta name="theme-color" content="#4b7bec" />
  <meta name="description" content="Ett enkelt och lärorikt spel för små barn." />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main id="gameRoot" class="game">
    <header class="top">
      <div class="top-row">
        <div class="app-title">
          <h1 id="gameTitle">Mata monstret</h1>
          <p id="appStatus" class="app-status">Redo att leka</p>
        </div>

        <button id="adultButton" class="adult-button" type="button" aria-label="Öppna vuxenläge">
          ⚙️
        </button>
      </div>

      <p id="instruction" class="instruction">Välj läge och starta!</p>

      <div id="progress" class="progress" aria-label="Framsteg"></div>
    </header>

    <section id="modeSelector" class="mode-selector" aria-label="Välj spelläge">
      <button class="mode-button" data-mode="name" type="button">
        <span class="mode-emoji">🍌</span>
        <span>Ord</span>
      </button>

      <button class="mode-button" data-mode="color" type="button">
        <span class="mode-emoji">🎨</span>
        <span>Färger</span>
      </button>

      <button class="mode-button" data-mode="category" type="button">
        <span class="mode-emoji">🧺</span>
        <span>Kategorier</span>
      </button>

      <button class="mode-button" data-mode="mixed" type="button">
        <span class="mode-emoji">✨</span>
        <span>Blandat</span>
      </button>
    </section>

    <section class="play-zone" aria-live="polite">
      <div id="monster" class="monster monster-hungry" aria-label="Hungrigt monster">
        <div class="monster-horn monster-horn-left"></div>
        <div class="monster-horn monster-horn-right"></div>

        <div class="monster-arm monster-arm-left"></div>
        <div class="monster-arm monster-arm-right"></div>

        <div class="monster-body">
          <div class="monster-eye monster-eye-left">
            <span></span>
          </div>

          <div class="monster-eye monster-eye-right">
            <span></span>
          </div>

          <div class="monster-cheek monster-cheek-left"></div>
          <div class="monster-cheek monster-cheek-right"></div>

          <div class="monster-mouth">
            <div class="monster-tongue"></div>
          </div>
        </div>

        <div class="monster-foot monster-foot-left"></div>
        <div class="monster-foot monster-foot-right"></div>
      </div>

      <div id="speech" class="speech">Jag är hungrig!</div>

      <div class="bowl-area" aria-label="Matskål">
        <div class="bowl">
          <div id="bowlItems" class="bowl-items"></div>
          <div class="bowl-front">🥣</div>
        </div>
      </div>

      <button id="repeatButton" class="repeat-button hidden" type="button">
        🔊 Hör igen
      </button>
    </section>

    <section id="choices" class="choices" aria-label="Svarsalternativ"></section>

    <section class="bottom">
      <button id="startButton" class="start-button" type="button">
        Starta spelet
      </button>
    </section>
  </main>

  <section id="settingsPanel" class="settings-panel hidden" aria-label="Vuxenläge">
    <div class="settings-card">
      <div class="settings-header">
        <h2>Vuxenläge</h2>

        <button id="closeSettingsButton" class="close-button" type="button" aria-label="Stäng vuxenläge">
          ✕
        </button>
      </div>

      <p class="settings-help">
        Här kan du anpassa spelet. Inställningarna sparas på den här mobilen.
      </p>

      <label class="setting-row">
        <span>Barnets namn</span>
        <select id="childNameSelect"></select>
      </label>

      <label id="childCustomNameRow" class="setting-row hidden">
        <span>Eget barnnamn</span>
        <input id="childNameInput" type="text" maxlength="20" placeholder="t.ex. Alma" />
      </label>

      <label class="setting-row">
        <span>Monstrets namn</span>
        <select id="monsterNameSelect"></select>
      </label>

      <label id="monsterCustomNameRow" class="setting-row hidden">
        <span>Eget monsternamn</span>
        <input id="monsterNameInput" type="text" maxlength="20" placeholder="t.ex. Mumsis" />
      </label>

      <label class="setting-row">
        <span>Röst</span>
        <select id="voiceSelect">
          <option value="custom">Egen röst + fallback</option>
          <option value="browser">Webbröst</option>
          <option value="off">Av</option>
        </select>
      </label>

      <label class="setting-row">
        <span>Effektljud</span>
        <select id="effectSelect">
          <option value="on">På</option>
          <option value="off">Av</option>
        </select>
      </label>

      <label class="setting-row">
        <span>Antal val</span>
        <select id="optionCountSelect">
          <option value="2">2 val</option>
          <option value="3">3 val</option>
          <option value="4">4 val</option>
        </select>
      </label>

      <label class="setting-row">
        <span>Rundor</span>
        <select id="roundCountSelect">
          <option value="3">3 rundor</option>
          <option value="5">5 rundor</option>
          <option value="10">10 rundor</option>
        </select>
      </label>

      <div class="settings-group">
        <h3>Kategorier</h3>

        <label class="check-row">
          <input class="category-checkbox" type="checkbox" value="mat" />
          <span>🍌 Mat</span>
        </label>

        <label class="check-row">
          <input class="category-checkbox" type="checkbox" value="djur" />
          <span>🐶 Djur</span>
        </label>

        <label class="check-row">
          <input class="category-checkbox" type="checkbox" value="leksak" />
          <span>🧸 Leksaker</span>
        </label>

        <label class="check-row">
          <input class="category-checkbox" type="checkbox" value="fordon" />
          <span>🚙 Fordon</span>
        </label>

        <label class="check-row">
          <input class="category-checkbox" type="checkbox" value="klader" />
          <span>🧦 Kläder</span>
        </label>
      </div>

      <div class="settings-actions">
        <button id="testAudioButton" class="secondary-button" type="button">
          Testa ljud
        </button>

        <button id="installButton" class="secondary-button hidden" type="button">
          Installera appen
        </button>

        <button id="resetSettingsButton" class="secondary-button" type="button">
          Återställ
        </button>
      </div>

      <p id="settingsMessage" class="settings-message"></p>
    </div>
  </section>

  <script type="module" src="script.js"></script>
</body>
</html>
